<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | TaleVerse</title>
    <!-- Include the same Font Awesome and Fonts as index.html -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0f172a;
            color: #cbd5e1;
            font-family: 'Lora', serif;
            margin: 0;
            padding: 20px;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .admin-box {
            background: var(--card-bg-dark, #1e293b);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(124, 58, 237, 0.4), 0 0 25px rgba(124, 58, 237, 0.2);
            padding: 40px;
            border: 1px solid #7c3aed;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
        }

        h1, h2 {
            font-family: 'Playfair Display', serif;
            color: #facc15;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.4);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #c4b5fd;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #7c3aed;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus, .form-group select:focus {
            outline: 1px solid #7c3aed;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }

        .admin-btn {
            background: linear-gradient(45deg, #facc15, #f59e0b);
            color: black;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
        }

        .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.6);
        }
        
        .admin-btn.small {
            padding: 6px 12px;
            font-size: 13px;
        }

        .admin-btn.danger {
            background: #ef4444;
            color: white;
            box-shadow: none;
        }

        #admin-dashboard {
            display: none; /* hidden until logged in */
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #475569;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .data-table th, .data-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #334155;
        }

        .data-table th {
            background-color: #0f172a;
            color: #f59e0b;
            font-family: 'Cinzel', serif;
        }

        .data-table tr:hover {
            background-color: #334155;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-bg-dark, #1e293b);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #7c3aed;
            width: 90%;
            max-width: 600px;
            position: relative;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
            backdrop-filter: blur(10px);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }

        .close-modal:hover { color: white; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div class="login-wrapper" id="admin-login-container">
        <div class="admin-box">
            <h1 style="text-align:center;">Admin Vault</h1>
            <form id="admin-login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="admin-email" placeholder="admin@taleverse.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" placeholder="Passphrase" required>
                </div>
                <button class="admin-btn" style="width:100%" type="submit">Unlock</button>
                <div id="login-msg" style="text-align:center; margin-top:15px; color:#ef4444;"></div>
            </form>
            <div style="text-align:center; margin-top:20px;">
                <a href="registration.html" style="color:#94a3b8;">← Return to Login</a>
            </div>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="admin-dashboard">
        <div class="dashboard-header">
            <h1>Grimoire Management (CRUD)</h1>
            <div>
                <button class="admin-btn" id="btn-add-product"><i class="fa-solid fa-plus"></i> Add Product</button>
                <button class="admin-btn" style="background:transparent; border:1px solid #f59e0b; color:#f59e0b;" id="admin-logout">Logout</button>
            </div>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Photo</th>
                    <th>Title & Author</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Rating</th>
                    <th>Edition</th>
                    <th>Format</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="books-table-body">
                <!-- Dynamically populated rows -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Book Modal -->
    <div id="book-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Add New Grimoire</h2>
            <form id="book-form">
                <input type="hidden" id="book-id">
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="book-title" required>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="book-author" required>
                </div>
                
                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;">
                        <label>Price (e.g. ₹250)</label>
                        <input type="text" id="book-price" required>
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Category</label>
                        <select id="book-category" required>
                            <option value="Fantasy">Fantasy</option>
                            <option value="Dystopian">Dystopian</option>
                            <option value="Thriller">Thriller</option>
                            <option value="Crime">Crime</option>
                            <option value="Horror">Horror</option>
                            <option value="Romance">Romance</option>
                            <option value="Non-fiction">Non-fiction</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Book photo (URL or path, e.g. images/NewBook.jpg)</label>
                    <input type="text" id="book-image" placeholder="images/placeholder.jpg">
                </div>

                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <div class="form-group" style="flex:1; min-width:120px;">
                        <label>Old price (optional)</label>
                        <input type="text" id="book-old-price" placeholder="₹530">
                    </div>
                    <div class="form-group" style="flex:1; min-width:120px;">
                        <label>Discount (optional)</label>
                        <input type="text" id="book-discount" placeholder="-20%">
                    </div>
                </div>

                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <div class="form-group" style="flex:1; min-width:120px;">
                        <label>Rating (0–5)</label>
                        <input type="number" id="book-rating" min="0" max="5" step="0.1" value="4.5">
                    </div>
                    <div class="form-group" style="flex:1; min-width:120px;">
                        <label>Edition</label>
                        <input type="text" id="book-edition" placeholder="Standard, 2nd ed.">
                    </div>
                    <div class="form-group" style="flex:1; min-width:140px;">
                        <label>Format</label>
                        <select id="book-format">
                            <option value="Paperback">Paperback</option>
                            <option value="Hardcover">Hardcover</option>
                            <option value="Ebook">Ebook</option>
                            <option value="Audiobook">Audiobook</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                        <input type="checkbox" id="book-bestseller" style="width:auto;">
                        Mark as bestseller
                    </label>
                </div>

                <div id="modal-msg" style="margin-bottom:15px; color:#ef4444;"></div>
                <button class="admin-btn" type="submit" id="modal-submit-btn">Save Product</button>
            </form>
        </div>
    </div>

    <script src="tv-modal.js"></script>
    <script src="admin.js"></script>
</body>
</html>
